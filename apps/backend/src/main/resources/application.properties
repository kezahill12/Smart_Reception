# Server Config
server.port=8080

# Database Config
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=true

# Security (Development - permissive for now)
spring.security.user.name=${SPRING_SECURITY_USER_NAME}
spring.security.user.password=${SPRING_SECURITY_USER_PASSWORD}

# Get these from: https://console.cloud.google.com ? Credentials ? OAuth 2.0
spring.security.oauth2.client.registration.google.client-id=${CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile


# Get these from: https://github.com/settings/developers ? OAuth Apps
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=user:email

jwt.secret=${JWT_SECRET:b7f4d9a8e2c13f0d6b5a9e7c4d2f1b8a3e6c5d9f7a1b2c3d4e5f6a7b8c9d0e1f}
# Token expiry: 86400000 ms = 24 hours
jwt.expiration=${JWT_EXPIRATION:86400000}

# OpenAPI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
